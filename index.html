<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTL Limited | Fire Alarm Specialists</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.85);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
  backdrop-filter: blur(6px);
}

nav a {
  color:#fff;
  margin-left:25px;
  text-decoration:none;
  font-weight:500;
}

nav a:hover {
  color:#e50914;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  background:#000;
}

/* IMAGE LAYER (NO ZOOM FIX) */
.hero::before {
  content: "";
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background: url('./hero.png') no-repeat center center;
  background-size: contain; /* THIS FIXES ZOOM */

  opacity:0.45;
  z-index:0;
}

/* KEEP TEXT ON TOP */
.hero * {
  position:relative;
  z-index:1;
}
/* TEXT ANIMATION */
.hero h1 {
  font-size:55px;
  margin-top:80px;
  animation: fadeUp 1s ease forwards;
}

.hero p {
  color:#ccc;
  margin-top:10px;
  animation: fadeUp 1.5s ease forwards;
}

/* BUTTON */
.btn {
  margin-top:25px;
  padding:15px 35px;
  background:#e50914;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
  transition:0.3s;
  animation: fadeUp 2s ease forwards;
}

.btn:hover {
  background:#ff1f1f;
  transform: scale(1.05);
}

/* SECTIONS */
.section {
  padding:80px 20px;
  text-align:center;
}

.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  margin-top:30px;
}

.card {
  background:#1a1a1a;
  padding:30px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform: translateY(-8px);
  background:#222;
}

/* FOOTER */
footer {
  background:#111;
  padding:25px;
  text-align:center;
  color:#aaa;
}

/* ANIMATION */
@keyframes fadeUp {
  from {
    opacity:0;
    transform: translateY(30px);
  }
  to {
    opacity:1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<nav>
  <h2>DTL Limited</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Fire Alarm Installations</h1>
  <p>Midlands Based • 24/7 Callouts</p>
  <a href="tel:07415202373" class="btn">📞 Call Now</a>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">🔥 Fire Alarm Installation</div>
    <div class="card">🛠 Servicing & Maintenance</div>
    <div class="card">💡 Emergency Lighting</div>
    <div class="card">⚡ Electrical Work</div>
  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <p>📞 07415 202373</p>
  <p>📍 Midlands, UK</p>
</section>

<footer>
  <p>© 2026 DTL Limited</p>
</footer>

</body>
</html>
