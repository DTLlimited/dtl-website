<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTL Limited | Fire Alarm Specialists</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

/* NAVBAR FIXED */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.9);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
}

nav a {
  color:#fff;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover {
  color:#e50914;
}

/* HERO IMAGE FIXED */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:1;

  background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('./hero.png');
  background-size: cover;
  background-position: 70% center;
  background-repeat: no-repeat;
}

.hero h1 {
  font-size:50px;
  margin-top:80px;
}

.hero p {
  color:#ccc;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:15px 30px;
  background:#e50914;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

/* SECTIONS */
.section {
  padding:60px 20px;
  text-align:center;
}

.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#1a1a1a;
  padding:25px;
  border-radius:10px;
}

/* FOOTER */
footer {
  background:#111;
  padding:20px;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<nav>
  <h2>DTL Limited</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Fire Alarm Installations</h1>
  <p>Midlands Based • 24/7 Callouts</p>
  <a href="tel:07415202373" class="btn">📞 Call Now</a>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">🔥 Fire Alarm Installation</div>
    <div class="card">🛠 Servicing & Maintenance</div>
    <div class="card">💡 Emergency Lighting</div>
    <div class="card">⚡ Electrical Work</div>
  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <p>📞 07415 202373</p>
  <p>📍 Midlands, UK</p>
</section>

<footer>
  <p>© 2026 DTL Limited</p>
</footer>

</html>
