<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTL Limited</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
}

/* HERO (MOBILE FIRST) */
.hero {
  height:100vh;
  background-image: url('./hero.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  padding:20px;
  position:relative;
}

/* DARK OVERLAY (makes text readable) */
.hero::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* TEXT ON TOP */
.hero-content {
  position:relative;
  z-index:1;
}

.hero h1 {
  font-size:28px;
  margin-bottom:10px;
}

.hero p {
  font-size:14px;
  color:#ddd;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:14px 25px;
  background:#e50914;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
  font-size:16px;
}

/* SERVICES */
.section {
  padding:50px 20px;
  text-align:center;
}

.card {
  background:#111;
  padding:20px;
  margin:10px 0;
  border-radius:8px;
}

/* STICKY CALL BUTTON (🔥 BIG UPGRADE) */
.call-bar {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#e50914;
  text-align:center;
  padding:15px;
}

.call-bar a {
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Fire Alarm Installations</h1>
    <p>Midlands Based • 24/7 Callouts</p>
    <a href="tel:07415202373" class="btn">Call Now</a>
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Our Services</h2>
  <div class="card">🔥 Fire Alarm Installation</div>
  <div class="card">🛠 Servicing & Maintenance</div>
  <div class="card">💡 Emergency Lighting</div>
  <div class="card">⚡ Electrical Work</div>
</section>

<!-- STICKY CALL BUTTON -->
<div class="call-bar">
  <a href="tel:07415202373">📞 Call Now</a>
</div>

</body>
</html>
