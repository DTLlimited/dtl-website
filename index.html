<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTL Limited</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('./hero.png') no-repeat center center;
  background-size: cover;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  position: relative;
}

/* OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* CONTENT */
.hero-content {
  position: relative;
  z-index: 2;
  padding: 20px;
}

.hero h1 {
  font-size: 28px;
}

.hero p {
  color: #ddd;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 25px;
  background: #e50914;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
  font-size: 16px;
}

/* SERVICES */
.section {
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: #111;
  padding: 20px;
  margin: 10px 0;
  border-radius: 8px;
}

/* CALL BAR */
.call-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #e50914;
  text-align: center;
  padding: 15px;
}

.call-bar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Fire Alarm Installations</h1>
    <p>UK Based • 24/7 Callouts</p>
    <a href="tel:07415202373" class="btn">Call Now</a>
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Our Services</h2>

  <div class="card">🔥 Fire Alarm Installation</div>
  <div class="card">🛠 Servicing & Maintenance</div>
  <div class="card">💡 Emergency Lighting</div>
  <div class="card">⚡ Electrical Work</div>

</section>

<!-- CONTACT -->
<section class="section">
  <h2>Contact</h2>
  <p>📞 07415 202373</p>
</section>

<!-- STICKY CALL BUTTON -->
<div class="call-bar">
  <a href="tel:07415202373">📞 Call Now</a>
</div>

</body>
</html>
